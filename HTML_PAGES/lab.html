<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joris Suarez — Lab</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { margin:0; background:#e8e6dd; color:#111110; font-family:'Archivo',sans-serif; -webkit-font-smoothing:antialiased; }
    * { box-sizing:border-box; }
    ::selection { background:#e8ff00; color:#111110; }
    a { color:inherit; text-decoration:none; }
    .mono { font-family:'JetBrains Mono',monospace; }
    .wide { font-weight:900; transform:scaleX(1.04); transform-origin:left; display:inline-block; }
    .cut { clip-path:polygon(0 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%); }
    .stripeY { background:repeating-linear-gradient(-45deg,#111110 0 12px,#e8ff00 12px 24px); }
    .xp { transition:transform .18s ease, box-shadow .18s ease; }
    .xp:hover { transform:translateY(-3px); box-shadow:7px 7px 0 #111110; }
  </style>
</head>
<body>

<!-- HUD RAIL -->
<div class="mono" style="display:flex; justify-content:space-between; align-items:center; gap:12px; padding:8px clamp(16px,4vw,40px); background:#111110; color:#8a897d; font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase;">
  <span style="color:#e8ff00;">◢◤</span>
  <span style="color:#e8e6dd;">&ldquo;LAB&rdquo; — INDEX_05</span>
  <span style="flex:1; height:2px; background:repeating-linear-gradient(90deg,#34342b 0 5px,transparent 5px 10px);"></span>
  <span style="color:#ff4d0f;">06 EXPERIMENTS</span>
  <span style="color:#e8ff00;">◢◤</span>
</div>

<main style="max-width:1180px; margin:0 auto; padding:clamp(40px,7vw,90px) clamp(16px,4vw,40px) 150px;">

  <!-- HEADER -->
  <header style="position:relative; margin-bottom:40px;">
    <div aria-hidden="true" class="wide" style="position:absolute; right:-2%; top:-26%; font-size:min(40vw,340px); line-height:0.7; color:rgba(255,77,15,0.07); pointer-events:none; transform-origin:right;">↗</div>
    <div class="mono" style="font-size:11px; letter-spacing:0.24em; color:#c43a0c; text-transform:uppercase; font-weight:700; margin-bottom:16px;" id="eyebrow">// TERRAIN D'EXPÉRIMENTATION</div>
    <h1 class="wide" style="margin:0; font-size:clamp(48px,9vw,120px); line-height:0.86; text-transform:uppercase;" id="h1">Le Lab<span style="color:#ff4d0f;">.</span></h1>
    <p style="margin:20px 0 0; max-width:54ch; font-size:clamp(15px,1.8vw,19px); line-height:1.55; color:#33322c; font-weight:500;" id="sub-text">Six explorations techniques et visuelles — là où je teste des idées avant qu'elles n'entrent en production.</p>
  </header>

  <div class="stripeY" aria-hidden="true" style="height:16px; margin-bottom:40px;"></div>

  <div id="experiments-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px;"></div>

</main>

<!-- DOCK -->
<nav style="position:fixed; left:50%; bottom:20px; transform:translateX(-50%); z-index:70; display:flex; align-items:stretch; gap:2px; background:#111110; border:2px solid #111110; box-shadow:6px 6px 0 rgba(17,17,16,0.25);">
  <a href="../index.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#e8e6dd;" onmouseover="this.style.color='#e8ff00'" onmouseout="this.style.color='#e8e6dd'" data-fr="Accueil" data-en="Home">Accueil</a>
  <a href="about.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#e8e6dd;" onmouseover="this.style.color='#e8ff00'" onmouseout="this.style.color='#e8e6dd'" data-fr="À propos" data-en="About">À propos</a>
  <a href="works.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#e8e6dd;" onmouseover="this.style.color='#e8ff00'" onmouseout="this.style.color='#e8e6dd'">Works</a>
  <a href="blogs.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#e8e6dd;" onmouseover="this.style.color='#e8ff00'" onmouseout="this.style.color='#e8e6dd'">Blog</a>
  <a href="lab.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; background:#e8ff00; color:#111110;">Lab</a>
  <a href="contact.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#e8e6dd;" onmouseover="this.style.color='#e8ff00'" onmouseout="this.style.color='#e8e6dd'" data-fr="Contact" data-en="Contact">Contact</a>
  <button id="lang-btn" class="mono" style="display:flex; align-items:center; padding:11px 14px; font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; background:#ff4d0f; color:#111110; border:none; cursor:pointer;">FR</button>
</nav>

<script>
  const data = {
    fr: {
      eyebrow: "// TERRAIN D'EXPÉRIMENTATION",
      h1: 'Le Lab',
      sub: 'Six explorations techniques et visuelles — là où je teste des idées avant qu\'elles n\'entrent en production.',
      items: [
        { title:'Aurora Background', desc:'Dégradés animés en temps réel via WebGL, mouvement organique et fluide en arrière-plan.', tags:['WEBGL','SHADERS'] },
        { title:'True Glassmorphism', desc:'Flou de fond réaliste avec réfraction et bordures lumineuses, sans surcoût de perf.', tags:['CSS','BACKDROP'] },
        { title:'Spring Physics', desc:'Transitions pilotées par ressorts amortis pour des interactions naturelles et réactives.', tags:['MOTION','PHYSICS'] },
        { title:'Noise Texture', desc:'Grain procédural généré au runtime pour casser le plat du numérique.', tags:['CANVAS','SVG'] },
        { title:'Bento Grid', desc:'Système de grille modulaire et responsive — la base de ce portfolio.', tags:['LAYOUT','GRID'] },
        { title:'Typographie cinétique', desc:'Texte animé réagissant au scroll et au curseur, pour une lecture vivante.', tags:['GSAP','TYPE'] }
      ]
    },
    en: {
      eyebrow: '// EXPERIMENTAL GROUND',
      h1: 'The Lab',
      sub: 'Six technical and visual explorations — where I test ideas before they reach production.',
      items: [
        { title:'Aurora Background', desc:'Real-time animated gradients via WebGL — organic, fluid background motion.', tags:['WEBGL','SHADERS'] },
        { title:'True Glassmorphism', desc:'Realistic backdrop blur with refraction and luminous edges, no perf hit.', tags:['CSS','BACKDROP'] },
        { title:'Spring Physics', desc:'Damped-spring driven transitions for natural, responsive interactions.', tags:['MOTION','PHYSICS'] },
        { title:'Noise Texture', desc:'Procedural grain generated at runtime to break digital flatness.', tags:['CANVAS','SVG'] },
        { title:'Bento Grid', desc:'Modular, responsive grid system — the backbone of this portfolio.', tags:['LAYOUT','GRID'] },
        { title:'Kinetic Typography', desc:'Text reacting to scroll and cursor for a living, breathing read.', tags:['GSAP','TYPE'] }
      ]
    }
  };

  const themes = [
    { bg:'#111110', fg:'#e8e6dd', muted:'#9d9c8f', ghost:'rgba(232,255,0,0.12)' },
    { bg:'#e8e6dd', fg:'#111110', muted:'#54524a', ghost:'rgba(17,17,16,0.06)' },
    { bg:'#e8ff00', fg:'#111110', muted:'#3a3a00', ghost:'rgba(17,17,16,0.1)' },
    { bg:'#e8e6dd', fg:'#111110', muted:'#54524a', ghost:'rgba(17,17,16,0.06)' },
    { bg:'#ff4d0f', fg:'#111110', muted:'#3a1405', ghost:'rgba(17,17,16,0.12)' },
    { bg:'#111110', fg:'#e8e6dd', muted:'#9d9c8f', ghost:'rgba(255,77,15,0.16)' }
  ];

  function renderGrid(lang) {
    const d = data[lang];
    document.getElementById('eyebrow').textContent = d.eyebrow;
    document.getElementById('h1').innerHTML = d.h1 + '<span style="color:#ff4d0f;">.</span>';
    document.getElementById('sub-text').textContent = d.sub;

    const grid = document.getElementById('experiments-grid');
    grid.innerHTML = d.items.map((it, i) => {
      const t = themes[i];
      const num = String(i + 1).padStart(2, '0');
      const tagsHtml = it.tags.map(tag =>
        `<span class="mono" style="border:2px solid ${t.fg}; font-size:10px; font-weight:700; letter-spacing:0.06em; padding:4px 9px; text-transform:uppercase;">${tag}</span>`
      ).join('');
      return `
        <article class="xp cut" style="border:2px solid #111110; background:${t.bg}; color:${t.fg}; padding:26px; display:flex; flex-direction:column; min-height:260px; position:relative; overflow:hidden;">
          <div aria-hidden="true" class="wide" style="position:absolute; right:-4%; bottom:-22%; font-size:140px; line-height:0.7; color:${t.ghost}; pointer-events:none; transform-origin:right;">${num}</div>
          <div style="position:relative; display:flex; gap:6px; flex-wrap:wrap;">${tagsHtml}</div>
          <h3 class="wide" style="position:relative; margin:18px 0 10px; font-size:clamp(24px,3vw,32px); text-transform:uppercase; line-height:0.95;">${it.title}</h3>
          <p style="position:relative; margin:0; flex:1; font-size:14px; line-height:1.55; color:${t.muted}; font-weight:500;">${it.desc}</p>
          <div class="mono" style="position:relative; margin-top:16px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;">EXP_${num}</div>
        </article>
      `;
    }).join('');
  }

  function applyLang(lang) {
    document.querySelectorAll('[data-fr][data-en]').forEach(el => {
      el.textContent = el.getAttribute('data-' + lang);
    });
    document.documentElement.lang = lang;
    const btn = document.getElementById('lang-btn');
    if (btn) btn.textContent = lang === 'fr' ? 'EN' : 'FR';
    renderGrid(lang);
  }

  document.addEventListener('DOMContentLoaded', () => {
    const lang = localStorage.getItem('siteLang') || 'fr';
    applyLang(lang);
    document.getElementById('lang-btn').addEventListener('click', () => {
      const cur = localStorage.getItem('siteLang') || 'fr';
      const next = cur === 'fr' ? 'en' : 'fr';
      localStorage.setItem('siteLang', next);
      applyLang(next);
    });
  });
</script>
</body>
</html>
