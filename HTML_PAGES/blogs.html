<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Joris Suarez</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../css/blogs.css">
</head>
<body>

<main class="blog-page">

  <section class="blog-hero reveal" style="--delay:0s">
    <span class="label" data-fr="Écrits & réflexions" data-en="Writing & thoughts">Écrits & réflexions</span>
    <h1 class="blog-headline" data-fr="Le Blog." data-en="The Blog.">Le Blog.</h1>
    <p class="blog-sub" data-fr="Pensées, tutoriels et observations sur le design et le code." data-en="Thoughts, tutorials and observations on design and code.">Pensées, tutoriels et observations sur le design et le code.</p>
  </section>

  <!-- Admin Panel (hidden by default) -->
  <section id="adminPanel" class="admin-panel hidden">
    <div class="admin-panel-header">
      <span class="label" data-fr="Nouvel article" data-en="New post">Nouvel article</span>
      <button id="logoutBtn" class="btn-danger" data-fr="Déconnexion" data-en="Logout">Déconnexion</button>
    </div>
    <form id="blogForm" class="blog-form">
      <div class="form-group">
        <label for="postTitle" data-fr="Titre" data-en="Title">Titre</label>
        <input type="text" id="postTitle" required autocomplete="off">
      </div>
      <div class="form-group">
        <label for="postContent" data-fr="Contenu" data-en="Content">Contenu</label>
        <textarea id="postContent" rows="5" required></textarea>
      </div>
      <div class="form-group">
        <label for="postCategory" data-fr="Catégorie" data-en="Category">Catégorie</label>
        <select id="postCategory">
          <option value="tech" data-fr="Technologie" data-en="Technology">Technologie</option>
          <option value="design">Design</option>
          <option value="tutorial" data-fr="Tutoriel" data-en="Tutorial">Tutoriel</option>
          <option value="news" data-fr="Actualités" data-en="News">Actualités</option>
        </select>
      </div>
      <button type="submit" class="btn-primary" data-fr="Publier" data-en="Publish">Publier</button>
    </form>
  </section>

  <!-- Blog grid -->
  <div id="blogGrid" class="blog-grid reveal" style="--delay:0.15s"></div>

  <div id="emptyState" class="blog-empty hidden">
    <p data-fr="Aucun article pour le moment." data-en="No posts yet.">Aucun article pour le moment.</p>
  </div>

</main>

<!-- Post Modal -->
<div id="postModal" class="modal hidden">
  <div class="modal-box post-modal-box">
    <button class="modal-close" id="postModalClose" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div id="postModalBody"></div>
  </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal hidden">
  <div class="modal-box">
    <button class="modal-close" id="loginModalClose" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <h2 class="modal-heading" data-fr="Connexion Admin" data-en="Admin Login">Connexion Admin</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="email" data-fr="Email" data-en="Email">Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password" data-fr="Mot de passe" data-en="Password">Mot de passe</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <p id="loginError" class="error-msg hidden" data-fr="Email ou mot de passe incorrect" data-en="Incorrect email or password">Email ou mot de passe incorrect</p>
      <button type="submit" class="btn-primary" style="width:100%" data-fr="Connexion" data-en="Login">Connexion</button>
    </form>
  </div>
</div>

<!-- Subtle admin trigger (hidden until hovered) -->
<button id="adminBtn" class="admin-fab" aria-label="Admin">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
</button>

<nav class="dock" aria-label="Navigation">
  <a href="../index.html" class="dock-item" aria-label="Accueil">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1v-9.5z"/><path d="M9 21V12h6v9"/></svg>
    <span class="dock-tooltip" data-fr="Accueil" data-en="Home">Accueil</span>
  </a>
  <a href="works.html" class="dock-item" aria-label="Travaux">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <span class="dock-tooltip" data-fr="Travaux" data-en="Works">Travaux</span>
  </a>
  <a href="blogs.html" class="dock-item active" aria-label="Blog">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M4 6h16M4 10h16M4 14h10M4 18h7"/></svg>
    <span class="dock-tooltip">Blog</span>
  </a>
  <a href="about.html" class="dock-item" aria-label="À propos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7"/></svg>
    <span class="dock-tooltip" data-fr="À propos" data-en="About">À propos</span>
  </a>
  <a href="services.html" class="dock-item" aria-label="Lab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M9 3h6v8l3.5 9H5.5L9 11V3z"/><path d="M6.5 18.5h11"/></svg>
    <span class="dock-tooltip">Lab</span>
  </a>
  <a href="contact.html" class="dock-item" aria-label="Contact">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
    <span class="dock-tooltip">Contact</span>
  </a>
  <div class="dock-sep" aria-hidden="true"></div>
  <button class="dock-item" id="lang-btn" aria-label="Changer de langue">
    <span class="dock-lang" id="lang-display">FR</span>
    <span class="dock-tooltip" id="lang-tip">Switch to English</span>
  </button>
</nav>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://xtaiqcqjefsaibmrgrxc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0YWlxY3FqZWZzYWlibXJncnhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM3NjQ1MTEsImV4cCI6MjA3OTM0MDUxMX0.GYB_49KtRNiACJJvQf44Dvw-xeny_k6Uuctx_TTNZBU';

  let supabase;
  try {
    supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (e) {
    console.error('Failed to create Supabase client:', e);
  }

  let isAdmin = false;
  let currentUser = null;
  let blogsCache = [];

  const adminBtn    = document.getElementById('adminBtn');
  const adminPanel  = document.getElementById('adminPanel');
  const loginModal  = document.getElementById('loginModal');
  const loginForm   = document.getElementById('loginForm');
  const loginError  = document.getElementById('loginError');
  const blogForm    = document.getElementById('blogForm');
  const blogGrid    = document.getElementById('blogGrid');
  const emptyState  = document.getElementById('emptyState');
  const logoutBtn   = document.getElementById('logoutBtn');
  const postModal   = document.getElementById('postModal');
  const postModalBody = document.getElementById('postModalBody');

  // ===== SUPABASE CRUD =====
  async function getBlogs() {
    const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
    if (error) { console.error('Error fetching blogs:', error); return []; }
    blogsCache = data.map(p => ({ id: p.id, title: p.title, content: p.content, category: p.category, date: p.created_at }));
    return blogsCache;
  }

  async function addBlog(title, content, category) {
    const { data, error } = await supabase.from('posts').insert([{ title, content, category }]).select();
    if (error) { console.error('Error adding blog:', error); alert('Error saving post: ' + error.message); return null; }
    return data[0];
  }

  async function deleteBlog(id) {
    const { error } = await supabase.from('posts').delete().eq('id', id);
    if (error) { console.error('Error deleting blog:', error); return; }
    await renderBlogs();
  }

  // ===== RENDER =====
  async function renderBlogs() {
    const blogs = await getBlogs();
    blogGrid.innerHTML = '';
    if (blogs.length === 0) {
      emptyState.classList.remove('hidden');
      blogGrid.classList.add('hidden');
      return;
    }
    emptyState.classList.add('hidden');
    blogGrid.classList.remove('hidden');
    blogs.forEach(blog => blogGrid.appendChild(createBlogCard(blog)));
    applyLang(localStorage.getItem('siteLang') || 'fr');
  }

  const categoryLabels = {
    tech:     { fr: 'Technologie', en: 'Technology' },
    design:   { fr: 'Design',      en: 'Design'     },
    tutorial: { fr: 'Tutoriel',    en: 'Tutorial'   },
    news:     { fr: 'Actualités',  en: 'News'       }
  };

  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function createBlogCard(blog) {
    const card = document.createElement('article');
    card.className = 'blog-card card';
    card.style.cursor = 'pointer';
    card.addEventListener('click', () => openPost(blog.id));

    const labelFr = escapeHtml(categoryLabels[blog.category]?.fr || blog.category);
    const labelEn = escapeHtml(categoryLabels[blog.category]?.en || blog.category);

    card.innerHTML = `
      <div class="blog-card-cat">
        <span class="tag" data-fr="${labelFr}" data-en="${labelEn}">${labelFr}</span>
      </div>
      <h3 class="blog-card-title">${escapeHtml(blog.title)}</h3>
      <p class="blog-card-excerpt">${escapeHtml(blog.content)}</p>
      <div class="blog-card-footer">
        <span class="blog-card-date">${formatDate(blog.date)}</span>
        <span class="blog-read-more" data-fr="Lire →" data-en="Read →">Lire →</span>
      </div>
    `;
    return card;
  }

  // ===== MODAL =====
  function openPost(id) {
    const blog = blogsCache.find(b => b.id === id);
    if (!blog) return;

    const savedLang = localStorage.getItem('siteLang') || 'fr';
    const labelFr = escapeHtml(categoryLabels[blog.category]?.fr || blog.category);
    const labelEn = escapeHtml(categoryLabels[blog.category]?.en || blog.category);
    const labelCurrent = escapeHtml(categoryLabels[blog.category]?.[savedLang] || blog.category);

    postModalBody.innerHTML = `
      <div class="post-detail">
        <span class="tag" data-fr="${labelFr}" data-en="${labelEn}">${labelCurrent}</span>
        <h2 class="post-title">${escapeHtml(blog.title)}</h2>
        <time class="post-date">${formatDate(blog.date)}</time>
        <div class="post-body">${escapeHtml(blog.content).replace(/\n/g, '<br>')}</div>
        ${isAdmin ? `<button class="btn-danger delete-post-btn" data-fr="${savedLang === 'fr' ? 'Supprimer' : 'Delete'}" data-en="Delete">${savedLang === 'fr' ? 'Supprimer' : 'Delete'}</button>` : ''}
      </div>
    `;

    if (isAdmin) {
      postModalBody.querySelector('.delete-post-btn')?.addEventListener('click', () => {
        window.deletePostAndClose(blog.id);
      });
    }

    postModal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closePostModal() {
    postModal.classList.add('hidden');
    document.body.style.overflow = '';
  }
  window.closePostModal = closePostModal;

  async function deletePostAndClose(id) {
    const lang = localStorage.getItem('siteLang') || 'fr';
    if (confirm(lang === 'en' ? 'Delete this post?' : 'Supprimer cet article ?')) {
      await deleteBlog(id);
      closePostModal();
    }
  }
  window.deletePostAndClose = deletePostAndClose;

  // ===== AUTH =====
  function showLoginModal() {
    loginModal.classList.remove('hidden');
    document.getElementById('email').focus();
  }

  function closeLoginModal() {
    loginModal.classList.add('hidden');
    loginError.classList.add('hidden');
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
  }

  async function loginAdmin(user) {
    isAdmin = true;
    currentUser = user;
    adminPanel.classList.remove('hidden');
    adminBtn.classList.add('hidden');
    closeLoginModal();
    await renderBlogs();
  }

  async function logoutAdmin() {
    const { error } = await supabase.auth.signOut();
    if (error) { console.error('Logout error:', error); return; }
    isAdmin = false;
    currentUser = null;
    adminPanel.classList.add('hidden');
    adminBtn.classList.remove('hidden');
    await renderBlogs();
  }

  async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) await loginAdmin(session.user);
  }

  // ===== LANGUAGE =====
  function toggleLang() {
    const cur = localStorage.getItem('siteLang') || 'fr';
    const next = cur === 'fr' ? 'en' : 'fr';
    applyLang(next);
    localStorage.setItem('siteLang', next);
  }

  function applyLang(lang) {
    document.querySelectorAll('[data-fr][data-en]').forEach(el => {
      el.textContent = el.getAttribute('data-' + lang);
    });
    document.documentElement.lang = lang;
    const d = document.getElementById('lang-display');
    const t = document.getElementById('lang-tip');
    if (d) d.textContent = lang.toUpperCase();
    if (t) t.textContent = lang === 'fr' ? 'Switch to English' : 'Passer en français';
  }

  // ===== EVENTS =====
  adminBtn.addEventListener('click', showLoginModal);
  logoutBtn.addEventListener('click', logoutAdmin);

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      loginError.classList.remove('hidden');
      document.getElementById('password').value = '';
    } else {
      await loginAdmin(data.user);
    }
  });

  blogForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title    = document.getElementById('postTitle').value;
    const content  = document.getElementById('postContent').value;
    const category = document.getElementById('postCategory').value;
    await addBlog(title, content, category);
    blogForm.reset();
    await renderBlogs();
  });

  document.getElementById('loginModalClose').addEventListener('click', closeLoginModal);
  document.getElementById('postModalClose').addEventListener('click', closePostModal);

  loginModal.addEventListener('click', (e) => { if (e.target === loginModal) closeLoginModal(); });
  postModal.addEventListener('click',  (e) => { if (e.target === postModal)  closePostModal();  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (!loginModal.classList.contains('hidden')) closeLoginModal();
      if (!postModal.classList.contains('hidden'))  closePostModal();
    }
  });

  // ===== INIT =====
  const ro = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); ro.unobserve(e.target); } });
  }, { threshold: 0.08 });

  document.addEventListener('DOMContentLoaded', async () => {
    applyLang(localStorage.getItem('siteLang') || 'fr');
    document.querySelectorAll('.reveal').forEach(el => ro.observe(el));
    document.getElementById('lang-btn').addEventListener('click', toggleLang);
    await checkAuth();
    await renderBlogs();
  });
</script>
</body>
</html>
