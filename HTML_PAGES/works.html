        <p data-fr="Impossible de charger les projets" data-en="Failed to load projects">Impossible de charger les projets</p>
        <button class="btn-primary" id="retry-btn" data-fr="Réessayer" data-en="Retry">Réessayer</button>

<script>
  const GITHUB_USERNAME = 'Seiya380';
  const REPOS_PER_PAGE = 30;

  const languageColors = {
    'JavaScript': '#f1e05a',
    'TypeScript': '#3178c6',
    'Python': '#3572A5',
    'HTML': '#e34c26',
    'CSS': '#563d7c',
    'C++': '#f34b7d',
    'C': '#555555',
    'Java': '#b07219',
    'Go': '#00ADD8',
    'Rust': '#dea584',
    'Ruby': '#701516',
    'PHP': '#4F5D95',
    'Swift': '#ffac45',
    'Kotlin': '#A97BFF',
    'Shell': '#89e051',
    'Vue': '#41b883',
    'Dart': '#00B4AB',
    'Lua': '#000080',
    'SCSS': '#c6538c',
    'default': '#8b949e'
  };

  async function loadGitHubRepos() {
    const container = document.getElementById('projects-container');
    const loadingState = document.getElementById('loading-state');
    const errorState = document.getElementById('error-state');

    loadingState.classList.remove('hidden');
    errorState.classList.add('hidden');
    container.querySelectorAll('.project-card').forEach(c => c.remove());

    try {
      const response = await fetch(
        `https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=${REPOS_PER_PAGE}&sort=updated&direction=desc`
      );
      if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
      const repos = await response.json();
      loadingState.classList.add('hidden');

      if (repos.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'empty-text';
        empty.setAttribute('data-fr', 'Aucun projet public trouvé');
        empty.setAttribute('data-en', 'No public projects found');
        empty.textContent = 'Aucun projet public trouvé';
        container.appendChild(empty);
        reapplyLanguage();
        return;
      }

      repos.forEach((repo, index) => {
        const card = createProjectCard(repo, index);
        container.appendChild(card);
      });

      document.querySelectorAll('.project-card.reveal').forEach(el => ro.observe(el));
      reapplyLanguage();
    } catch (error) {
      console.error('Failed to fetch GitHub repos:', error);
      loadingState.classList.add('hidden');
      errorState.classList.remove('hidden');
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function safeUrl(url) {
    return (typeof url === 'string' && url.startsWith('https://')) ? url : '#';
  }

  function createProjectCard(repo, index) {
    const card = document.createElement('article');
    card.className = 'project-card card reveal';
    card.style.setProperty('--delay', `${Math.min(index * 0.04, 0.6)}s`);

    const language = repo.language || 'default';
    const langColor = languageColors[language] || languageColors['default'];
    const savedLang = localStorage.getItem('siteLang') || 'fr';

    const rawDesc = repo.description
      ? (repo.description.length > 110 ? repo.description.substring(0, 110) + '\u2026' : repo.description)
      : (savedLang === 'fr' ? 'Projet GitHub' : 'GitHub project');

    card.innerHTML = `
      <div class="project-body">
        <h3 class="project-title">${escapeHtml(repo.name)}</h3>
        <p class="project-desc">${escapeHtml(rawDesc)}</p>
        <div class="project-meta">
          ${repo.language ? `<span class="meta-lang"><span class="lang-dot" style="background:${langColor}"></span>${escapeHtml(repo.language)}</span>` : ''}
          <span class="meta-stat">
            <svg viewBox="0 0 16 16" fill="currentColor" width="11" height="11"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>
            ${parseInt(repo.stargazers_count, 10) || 0}
          </span>
          <span class="meta-stat">
            <svg viewBox="0 0 16 16" fill="currentColor" width="11" height="11"><path d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 100-1.5.75.75 0 000 1.5z"/></svg>
            ${parseInt(repo.forks_count, 10) || 0}
          </span>
        </div>
        ${repo.topics && repo.topics.length > 0
          ? `<div class="project-tags">${repo.topics.slice(0, 4).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>`
          : (repo.language ? `<div class="project-tags"><span class="tag">${escapeHtml(repo.language)}</span></div>` : '')
        }
      </div>
      <a href="${safeUrl(repo.html_url)}" target="_blank" rel="noopener noreferrer" class="project-link" aria-label="Open ${escapeHtml(repo.name)} on GitHub">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
      </a>
    `;

    return card;
  }

  function reapplyLanguage() {
    applyLang(localStorage.getItem('siteLang') || 'fr');
  }

  function toggleLang() {
    const cur = localStorage.getItem('siteLang') || 'fr';
    const next = cur === 'fr' ? 'en' : 'fr';
    applyLang(next);
    localStorage.setItem('siteLang', next);
  }

  function applyLang(lang) {
    document.querySelectorAll('[data-fr][data-en]').forEach(el => {
      el.textContent = el.getAttribute('data-' + lang);
    });
    document.documentElement.lang = lang;
    const d = document.getElementById('lang-display');
    const t = document.getElementById('lang-tip');
    if (d) d.textContent = lang.toUpperCase();
    if (t) t.textContent = lang === 'fr' ? 'Switch to English' : 'Passer en français';
  }

  const ro = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); ro.unobserve(e.target); } });
  }, { threshold: 0.08 });

  document.addEventListener('DOMContentLoaded', () => {
    applyLang(localStorage.getItem('siteLang') || 'fr');
    document.querySelectorAll('.reveal').forEach(el => ro.observe(el));
    document.getElementById('lang-btn').addEventListener('click', toggleLang);
    document.getElementById('retry-btn').addEventListener('click', loadGitHubRepos);
    loadGitHubRepos();
  });
</script>
</body>
