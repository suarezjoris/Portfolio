<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joris Suarez — Works</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { margin:0; background:#e8e6dd; color:#111110; font-family:'Archivo',sans-serif; -webkit-font-smoothing:antialiased; }
    * { box-sizing:border-box; }
    ::selection { background:#e8ff00; color:#111110; }
    a { color:inherit; text-decoration:none; }
    .mono { font-family:'JetBrains Mono',monospace; }
    .wide { font-weight:900; transform:scaleX(1.04); transform-origin:left; display:inline-block; }
    .cut { clip-path:polygon(0 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%); }
    .stripeY { background:repeating-linear-gradient(-45deg,#111110 0 12px,#e8ff00 12px 24px); }
    .repo { transition:transform .18s ease, box-shadow .18s ease; }
    .repo:hover { transform:translateY(-3px); box-shadow:7px 7px 0 #111110; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<!-- HUD RAIL -->
<div class="mono" style="display:flex; justify-content:space-between; align-items:center; gap:12px; padding:8px clamp(16px,4vw,40px); background:#111110; color:#8a897d; font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase;">
  <span style="color:#e8ff00;">◢◤</span>
  <span style="color:#e8e6dd;">&ldquo;WORKS&rdquo; — INDEX_03</span>
  <span style="flex:1; height:2px; background:repeating-linear-gradient(90deg,#34342b 0 5px,transparent 5px 10px);"></span>
  <span style="color:#ff4d0f;">LIVE</span>
  <span style="color:#e8ff00;">◢◤</span>
</div>

<main style="max-width:1180px; margin:0 auto; padding:clamp(40px,7vw,90px) clamp(16px,4vw,40px) 150px;">

  <header style="position:relative; margin-bottom:40px;">
    <div aria-hidden="true" class="wide" style="position:absolute; right:-2%; top:-26%; font-size:min(40vw,340px); line-height:0.7; color:rgba(17,17,16,0.05); pointer-events:none; transform-origin:right;">W</div>
    <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap;">
      <div>
        <div class="mono" style="font-size:11px; letter-spacing:0.24em; color:#c43a0c; text-transform:uppercase; font-weight:700; margin-bottom:16px;" id="eyebrow">// DÉPÔTS PUBLICS</div>
        <h1 class="wide" style="margin:0; font-size:clamp(48px,9vw,120px); line-height:0.86; text-transform:uppercase;">Works<span style="color:#ff4d0f;">*</span></h1>
        <p style="margin:20px 0 0; max-width:50ch; font-size:clamp(15px,1.8vw,19px); line-height:1.55; color:#33322c; font-weight:500;" id="sub-text">Une sélection vivante de mes dépôts, chargée en direct depuis l'API GitHub. Triée par étoiles puis activité récente.</p>
      </div>
      <a href="https://github.com/suarezjoris" target="_blank" rel="noopener" class="mono cut" style="display:inline-flex; align-items:center; gap:9px; background:#111110; color:#e8ff00; font-size:12px; font-weight:800; letter-spacing:0.08em; padding:13px 18px; text-transform:uppercase;">@suarezjoris ↗</a>
    </div>
  </header>

  <div class="stripeY" aria-hidden="true" style="height:16px; margin-bottom:40px;"></div>

  <div id="state-loading" style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 0; gap:20px;">
    <div style="width:42px; height:42px; border:4px solid #111110; border-top-color:#ff4d0f; border-radius:50%; animation:spin 0.8s linear infinite;"></div>
    <div class="mono" id="loading-text" style="font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:#54524a;">CHARGEMENT DES DÉPÔTS…</div>
  </div>

  <div id="state-error" style="display:none;">
    <div class="cut" style="background:#111110; color:#e8e6dd; padding:40px; text-align:center;">
      <div class="wide" id="err-title" style="font-size:clamp(28px,4vw,42px); text-transform:uppercase; color:#ff4d0f; margin-bottom:10px;">Erreur</div>
      <p id="err-msg" style="margin:0 0 24px; font-size:15px; color:#9d9c8f; font-weight:500;"></p>
      <button onclick="fetchRepos()" class="mono cut" id="retry-btn" style="background:#e8ff00; color:#111110; border:none; font-size:12px; font-weight:800; letter-spacing:0.1em; padding:13px 22px; text-transform:uppercase; cursor:pointer;">↻ Réessayer</button>
    </div>
  </div>

  <div id="state-loaded" style="display:none;">
    <div id="repos-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:16px;"></div>
  </div>

</main>

<!-- DOCK -->
<nav style="position:fixed; left:50%; bottom:20px; transform:translateX(-50%); z-index:70; display:flex; align-items:stretch; gap:2px; background:#111110; border:2px solid #111110; box-shadow:6px 6px 0 rgba(17,17,16,0.25);">
  <a href="../index.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#e8e6dd;" onmouseover="this.style.color='#e8ff00'" onmouseout="this.style.color='#e8e6dd'" data-fr="Accueil" data-en="Home">Accueil</a>
  <a href="about.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#e8e6dd;" onmouseover="this.style.color='#e8ff00'" onmouseout="this.style.color='#e8e6dd'" data-fr="À propos" data-en="About">À propos</a>
  <a href="works.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; background:#e8ff00; color:#111110;">Works</a>
  <a href="blogs.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#e8e6dd;" onmouseover="this.style.color='#e8ff00'" onmouseout="this.style.color='#e8e6dd'">Blog</a>
  <a href="lab.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#e8e6dd;" onmouseover="this.style.color='#e8ff00'" onmouseout="this.style.color='#e8e6dd'">Lab</a>
  <a href="contact.html" class="mono" style="display:flex; align-items:center; padding:11px 15px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#e8e6dd;" onmouseover="this.style.color='#e8ff00'" onmouseout="this.style.color='#e8e6dd'" data-fr="Contact" data-en="Contact">Contact</a>
  <button id="lang-btn" class="mono" style="display:flex; align-items:center; padding:11px 14px; font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; background:#ff4d0f; color:#111110; border:none; cursor:pointer;">FR</button>
</nav>

<script>
  const langColors = { JavaScript:'#e8ff00', TypeScript:'#3178c6', Python:'#3ddc6e', HTML:'#ff4d0f', CSS:'#a06bff', Vue:'#41b883', Shell:'#89e051', Java:'#b07219', Go:'#00add8', PHP:'#777bb4', Rust:'#dea584', Dart:'#00b4ab', 'C':'#555555', 'C++':'#f34b7d', Ruby:'#cc342d' };
  const i18n = {
    fr: { eyebrow:'// DÉPÔTS PUBLICS', sub:'Une sélection vivante de mes dépôts, chargée en direct depuis l\'API GitHub. Triée par étoiles puis activité récente.', loading:'CHARGEMENT DES DÉPÔTS…', errTitle:'Erreur', retry:'Réessayer' },
    en: { eyebrow:'// PUBLIC REPOS', sub:'A living selection of my repositories, loaded live from the GitHub API. Sorted by stars then recent activity.', loading:'LOADING REPOSITORIES…', errTitle:'Error', retry:'Retry' }
  };
  let currentLang = 'fr';

  function applyLang(lang) {
    currentLang = lang;
    document.querySelectorAll('[data-fr][data-en]').forEach(el => { el.textContent = el.getAttribute('data-' + lang); });
    document.documentElement.lang = lang;
    const btn = document.getElementById('lang-btn');
    if (btn) btn.textContent = lang === 'fr' ? 'EN' : 'FR';
    const t = i18n[lang];
    document.getElementById('eyebrow').textContent = t.eyebrow;
    document.getElementById('sub-text').textContent = t.sub;
    document.getElementById('loading-text').textContent = t.loading;
    document.getElementById('err-title').textContent = t.errTitle;
    document.getElementById('retry-btn').textContent = '↻ ' + t.retry;
  }

  function fetchRepos() {
    document.getElementById('state-loading').style.display = 'flex';
    document.getElementById('state-error').style.display = 'none';
    document.getElementById('state-loaded').style.display = 'none';
    fetch('https://api.github.com/users/suarezjoris/repos?sort=updated&per_page=30')
      .then(res => { if (!res.ok) throw new Error('HTTP ' + res.status + (res.status === 403 ? ' — rate limit' : '')); return res.json(); })
      .then(data => {
        if (!Array.isArray(data)) throw new Error('Unexpected response');
        const repos = data.filter(r => !r.fork).sort((a, b) => (b.stargazers_count - a.stargazers_count) || (new Date(b.updated_at) - new Date(a.updated_at)));
        const grid = document.getElementById('repos-grid');
        grid.innerHTML = repos.map((r, i) => {
          const color = langColors[r.language] || '#8a897d';
          return `<a href="${r.html_url}" target="_blank" rel="noopener" class="repo cut" style="border:2px solid #111110; background:#e8e6dd; padding:22px; display:flex; flex-direction:column; min-height:190px;">
            <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
              <span class="mono" style="font-size:10px; letter-spacing:0.1em; color:#c43a0c; text-transform:uppercase; font-weight:700;">R_${String(i+1).padStart(2,'0')}</span>
              <span class="mono" style="font-size:13px;">↗</span>
            </div>
            <div class="wide" style="margin-top:14px; font-size:22px; text-transform:uppercase; line-height:0.95; word-break:break-word;">${r.name}</div>
            <p style="margin:10px 0 0; flex:1; font-size:13.5px; line-height:1.5; color:#54524a; font-weight:500;">${r.description || '—'}</p>
            <div style="display:flex; align-items:center; gap:14px; margin-top:16px; flex-wrap:wrap;">
              <span class="mono" style="display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600;"><span style="width:10px; height:10px; background:${color}; border:1.5px solid #111110; display:inline-block;"></span>${r.language || 'N/A'}</span>
              <span class="mono" style="font-size:11px; font-weight:600; color:#54524a;">★ ${r.stargazers_count}</span>
              <span class="mono" style="font-size:11px; font-weight:600; color:#54524a;">⑂ ${r.forks_count}</span>
            </div>
          </a>`;
        }).join('');
        document.getElementById('state-loading').style.display = 'none';
        document.getElementById('state-loaded').style.display = 'block';
      })
      .catch(err => {
        document.getElementById('state-loading').style.display = 'none';
        document.getElementById('state-error').style.display = 'block';
        document.getElementById('err-msg').textContent = String(err.message || err);
      });
  }

  document.addEventListener('DOMContentLoaded', () => {
    const lang = localStorage.getItem('siteLang') || 'fr';
    applyLang(lang);
    document.getElementById('lang-btn').addEventListener('click', () => {
      const cur = localStorage.getItem('siteLang') || 'fr';
      const next = cur === 'fr' ? 'en' : 'fr';
      localStorage.setItem('siteLang', next);
      applyLang(next);
    });
    fetchRepos();
  });
</script>
</body>
</html>
